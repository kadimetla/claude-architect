<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#E8EEF7"/>

  <rect x="0" y="0" width="1920" height="120" fill="#0F2A47"/>
  <text x="60" y="62" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="44" font-weight="700"
        fill="#FFFFFF">CLAUDE.md hierarchy</text>
  <text x="60" y="92" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="400"
        fill="#F2A93B" letter-spacing="2">DOMAIN 3  -  USER AND PROJECT LOAD EVERY TIME.  SUBTREE LOADS ON DEMAND.</text>

  <rect x="160" y="180" width="1600" height="147" rx="12" fill="#FFFFFF" stroke="#3D6BB1" stroke-width="3"/>
  <rect x="160" y="180" width="22" height="147" fill="#3D6BB1"/>
  <text x="210" y="230" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#3D6BB1">User</text>
  <text x="410" y="230" font-family="'Cascadia Code', 'Consolas', 'Menlo', monospace" font-size="26" font-weight="600" fill="#1A2235">~/.claude/CLAUDE.md</text>
  <text x="210" y="275" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1A2235">Your machine, every project.  Personal defaults, voice rules, your stack preferences.</text>
  <text x="210" y="308" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#6B7A91" letter-spacing="2">ALWAYS LOADS</text>

  <rect x="160" y="345" width="1600" height="147" rx="12" fill="#FFFFFF" stroke="#1FA8B3" stroke-width="3"/>
  <rect x="160" y="345" width="22" height="147" fill="#1FA8B3"/>
  <text x="210" y="395" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#1FA8B3">Project</text>
  <text x="410" y="395" font-family="'Cascadia Code', 'Consolas', 'Menlo', monospace" font-size="26" font-weight="600" fill="#1A2235">./CLAUDE.md</text>
  <text x="210" y="440" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1A2235">Team conventions.  Checked into git.  Overrides user rules where they conflict.</text>
  <text x="210" y="473" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#6B7A91" letter-spacing="2">ALWAYS LOADS</text>

  <rect x="160" y="510" width="1600" height="147" rx="12" fill="#FFFFFF" stroke="#F2A93B" stroke-width="3"/>
  <rect x="160" y="510" width="22" height="147" fill="#F2A93B"/>
  <text x="210" y="560" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#F2A93B">Subtree</text>
  <text x="410" y="560" font-family="'Cascadia Code', 'Consolas', 'Menlo', monospace" font-size="26" font-weight="600" fill="#1A2235">./&lt;subdir&gt;/CLAUDE.md</text>
  <text x="210" y="605" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1A2235">Frontend rules, infra rules.  Loads ONLY when the agent reads files in that subdirectory.</text>
  <text x="210" y="638" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#6B7A91" letter-spacing="2">ON-DEMAND LOAD</text>

  <rect x="160" y="675" width="1600" height="147" rx="12" fill="#FFFFFF" stroke="#D85A2A" stroke-width="3"/>
  <rect x="160" y="675" width="22" height="147" fill="#D85A2A"/>
  <text x="210" y="725" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#D85A2A">Local</text>
  <text x="410" y="725" font-family="'Cascadia Code', 'Consolas', 'Menlo', monospace" font-size="26" font-weight="600" fill="#1A2235">./CLAUDE.local.md</text>
  <text x="210" y="770" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#1A2235">Gitignored personal override.  Repo-specific tweaks that should not pollute team conventions.</text>
  <text x="210" y="803" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#6B7A91" letter-spacing="2">ALWAYS LOADS (IF PRESENT)</text>

  <text x="60" y="195" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="700"
        fill="#6B7A91" letter-spacing="2">LOAD</text>
  <text x="60" y="218" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="700"
        fill="#6B7A91" letter-spacing="2">ORDER</text>
  <path d="M 90 240 L 90 855 M 80 845 L 90 860 L 100 845" stroke="#6B7A91" stroke-width="3" fill="none"/>

  <rect x="160" y="945" width="1600" height="56" rx="8" fill="#0F2A47" opacity="0.08"/>
  <text x="180" y="980" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#1A2235">
    Agent SDK:  settingSources = ["user", "project"] loads both.  Skill triggers and slash commands inherit from the same tree.
  </text>

  <rect x="0" y="1030" width="1920" height="50" fill="#0F2A47" opacity="0.92"/>
  <text x="60" y="1065" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="600"
        fill="#F2A93B" letter-spacing="1">DOMAIN 3 - CLAUDE CODE CONFIGURATION (20%)</text>
  <text x="1860" y="1065" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="400"
        fill="#FFFFFF" text-anchor="end">Segment 2</text>
</svg>